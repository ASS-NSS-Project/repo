on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  commit-msg-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies (including dev)
        run: |
          # optional: keep venv in repo for predictable paths
          poetry config virtualenvs.create false --local || true
          poetry install --with dev

      - name: Run pre-commit commit-msg hooks
        run: |
          # 1. Create a temporary file to hold the commit message
          MSG_FILE=$(mktemp)

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs, we usually want to validate the HEAD commit of the branch
            git log -1 --format=%B ${{ github.event.pull_request.head.sha }} > "$MSG_FILE"
            echo "Checking PR Head Commit Message..."
          else
            # For pushes to main, check the latest commit
            git log -1 --format=%B > "$MSG_FILE"
            echo "Checking Latest Push Commit Message..."
          fi

          # 2. Run pre-commit and explicitly point to our temp file
          poetry run pre-commit run --hook-stage commit-msg --commit-msg-filename "$MSG_FILE"
